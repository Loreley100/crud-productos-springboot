<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos - Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Gestión de Productos</h1>
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
    <!--CREAR PRODUCTO-->
            <h5 class="mb-0">Agregar Nuevo Producto</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/guardar}" th:object="${producto}" method="post">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" th:field="*{nombre}" placeholder="Nombre del producto" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="precio" class="form-label">Precio</label>
                        <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}" placeholder="0.00" required>
                    </div>
                    <div class="col-md-2 mb-3">
                        <label for="stock" class="form-label">Stock</label>
                        <input type="number" class="form-control" id="stock" th:field="*{stock}" placeholder="0" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="categoria" class="form-label">Categoría</label>
                        <input type="text" class="form-control" id="categoria" th:field="*{categoria}" placeholder="Categoría" required>
                    </div>
                    <div class="col-md-1 mb-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100">Guardar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!--TABLA PARA LISTAR PRODUCTOS-->
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Lista de Productos</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prod : ${productos}">
                        <td th:text="${prod.id}"></td>
                        <td th:text="${prod.nombre}"></td>
                        <td th:text="'$' + ${prod.precio}"></td>
                        <td th:text="${prod.stock}"></td>
                        <td th:text="${prod.categoria}"></td>
                        <td>
                            <a th:href="@{/editar/{id}(id=${prod.id})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/eliminar/{id}(id=${prod.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(productos)}">
                        <td colspan="6" class="text-center text-muted">No hay productos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
